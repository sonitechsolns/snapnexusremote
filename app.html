    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ---------- Theme tokens ---------- */
        :root {
            /* Brand font is fixed — never overridden by a theme block. */
            --font-brand: 'Syne', sans-serif;
        }
        :root,
        [data-theme="default"] {
            --bg-mesh-a: #020617; --bg-mesh-b: #1e3a8a; --bg-mesh-c: #3b82f6; --bg-mesh-d: #4f46e5;
            --bg-solid: #020617;
            --surface-bg: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --accent: #3b82f6;

            --font-heading: 'Syne', sans-serif;
            --font-body: 'Urbanist', sans-serif;
            --radius-card: 24px;
        }
        [data-theme="wedding"] {
            --bg-mesh-a: #fff7f3; --bg-mesh-b: #fde2e7; --bg-mesh-c: #f6c9d0; --bg-mesh-d: #e9c9a8;
            --bg-solid: #fdf6f2;
            --surface-bg: rgba(255, 255, 255, 0.8);
            --surface-border: rgba(196, 154, 108, 0.4);
            --text-primary: #5c3a3a;
            --text-secondary: #8a6a64;
            --accent: #c9a063;
            --accent-strong: #a9824f;
            --accent-soft: rgba(201, 160, 99, 0.35);
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Lora', serif;
            --radius-card: 30px;
        }
        [data-theme="corporate"] {
            --bg-mesh-a: #000000; --bg-mesh-b: #ffc400; --bg-mesh-c: #ff5e00; --bg-mesh-d: #22d3ee;
            --bg-solid: #020203;
            --surface-bg: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.14);
            --text-primary: #ffffff;
            --text-secondary: #d4d4d8;
            --accent: #ffc83d;
            --accent-strong: #ff7a1a;
            --accent-soft: rgba(255, 200, 61, 0.35);
            --font-heading: 'Inter', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-card: 14px;
        }
        [data-theme="party"] {
            --bg-mesh-a: #070110; --bg-mesh-b: #1a0530; --bg-mesh-c: #5b0fb5; --bg-mesh-d: #ff00c8;
            --bg-solid: #070110;
            --surface-bg: rgba(20, 4, 32, 0.72);
            --surface-border: rgba(255, 0, 200, 0.4);
            --text-primary: #f5f3ff;
            --text-secondary: #c4b5fd;
            --accent: #00f0ff;
            --accent-strong: #ff00c8;
            --accent-soft: rgba(0, 240, 255, 0.45);
            --font-heading: 'Urbanist', sans-serif;
            --font-body: 'Urbanist', sans-serif;
            --radius-card: 20px;
        }

        body { font-family: var(--font-body); background: var(--bg-solid); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: background 0.4s ease, color 0.4s ease; }

        /* Continuous Background Animation */
        .liquid-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: radial-gradient(circle at 20% 30%, var(--bg-mesh-a), var(--bg-mesh-b) 30%, var(--bg-mesh-c) 65%, var(--bg-mesh-d)); background-size: 200% 200%; animation: liquidShift 16s ease infinite alternate; transition: background 0.6s ease; }
        @keyframes liquidShift { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 50%; } }

        /* Corporate theme: Aurora Mesh Gradient — single organic blob (cream/gold/amber core, blue rim wrap, grain) */
        [data-theme="corporate"] .liquid-mesh {
            background:
                radial-gradient(ellipse 60% 50% at 18% 15%, rgba(10, 69, 112, 0.55), transparent 60%),
                radial-gradient(ellipse 50% 45% at 8% 92%, rgba(10, 69, 112, 0.35), transparent 60%),
                #020203;
            animation: none;
        }
        [data-theme="corporate"] .liquid-mesh::before {
            content: '';
            position: absolute;
            top: 6%; left: -10%;
            width: 78%; height: 80%;
            background: radial-gradient(ellipse 70% 65% at 40% 58%, #f3fa7a 0%, #e9d34a 16%, #d9a01f 32%, #b16d02 50%, #7a4400 66%, transparent 82%);
            border-radius: 38% 62% 58% 42% / 52% 46% 54% 48%;
            filter: blur(45px);
            animation: corporateBlobMorph 26s ease-in-out infinite alternate;
        }
        [data-theme="corporate"] .liquid-mesh::after {
            content: '';
            position: absolute; inset: 0;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44NSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjxmZUNvbG9yTWF0cml4IHR5cGU9Im1hdHJpeCIgdmFsdWVzPSIwIDAgMCAwIDAgIDAgMCAwIDAgMCAgMCAwIDAgMCAwICAwIDAgMCAwLjEyIDAiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCglMjNuKSIvPjwvc3ZnPg==");
            background-size: 220px 220px;
            background-repeat: repeat;
            mix-blend-mode: overlay;
            opacity: 0.55;
        }
        @keyframes corporateBlobMorph {
            0%   { border-radius: 38% 62% 58% 42% / 52% 46% 54% 48%; transform: rotate(-4deg) scale(1); }
            50%  { border-radius: 48% 52% 45% 55% / 45% 55% 48% 52%; transform: rotate(2deg) scale(1.04); }
            100% { border-radius: 42% 58% 50% 50% / 50% 48% 52% 50%; transform: rotate(-6deg) scale(1); }
        }

        .camera-ui { width: 100%; max-width: 400px; padding: 20px; text-align: center; z-index: 10; position: relative; background: var(--surface-bg); backdrop-filter: blur(16px); border: 1px solid var(--surface-border); border-radius: var(--radius-card); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: background 0.4s ease, border-color 0.4s ease, border-radius 0.4s ease; }
        .logo-text { font-family: var(--font-brand); font-size: 2rem; margin-bottom: 40px; color: var(--accent); }
        .shutter-btn { width: 90px; height: 90px; border-radius: 50%; background: transparent; border: 4px solid var(--text-primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 30px var(--accent-soft); }
        .shutter-inner { width: 70px; height: 70px; border-radius: 50%; background: var(--text-primary); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .shutter-btn:active .shutter-inner { transform: scale(0.9); background: var(--accent-soft); }
        .status-msg { font-size: 1.1rem; color: var(--text-secondary); font-weight: 600; }
        .hint-msg { font-size: 0.8rem; color: var(--text-secondary); opacity: 0.75; margin-top: 8px; }
        input[type="file"] { display: none; }

        /* ---------- Toasts ---------- */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; align-items: center; width: 90%; max-width: 380px; pointer-events: none; }
        .toast { background: var(--surface-bg); border: 1px solid var(--surface-border); color: var(--text-primary); padding: 12px 18px; border-radius: 14px; font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.35); backdrop-filter: blur(14px); opacity: 0; transform: translateY(-16px); transition: opacity 0.3s ease, transform 0.3s ease; display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: #ef4444; }
        .toast.success { border-color: #10b981; }
        .toast-icon { flex-shrink: 0; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="liquid-mesh"></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="camera-ui">
        <h1 class="logo-text">SnapNexus</h1>
        <button class="shutter-btn" id="uploadBtn">
            <div class="shutter-inner" id="shutterInner"></div>
        </button>
        <p class="status-msg" id="statusMsg">Tap to send a photo or video</p>
        <p class="hint-msg">Up to 5 files · Videos max 15s &amp; 15MB</p>
        <input type="file" id="fileInput" accept="image/*,video/mp4,video/quicktime" multiple>
    </div>

    <script>
        const cfg = window.SnapNexus;
        const client = new Appwrite.Client()
            .setEndpoint(cfg.ENDPOINT)
            .setProject(cfg.PROJECT_ID);
        const databases = new Appwrite.Databases(client);
        const storage = new Appwrite.Storage(client);

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event');

        if (!eventId) {
            document.body.innerHTML = '<h2 style="color:white; text-align:center; margin-top:50px;">Invalid Link</h2>';
            throw new Error("Halt");
        }

        const isDemo = eventId.startsWith('demo_');

        const MAX_FILES = 5;
        const MAX_VIDEO_BYTES = 15 * 1024 * 1024; // 15MB
        const MAX_VIDEO_SECONDS = 15;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'error' ? '⚠️' : (type === 'success' ? '✅' : 'ℹ️');
            toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme || 'default');
        }

        function getFileKind(file) {
            const name = file.name.toLowerCase();
            if (file.type.startsWith('video/') || /\.(mp4|mov)$/.test(name)) return 'video';
            if (file.type === 'image/gif' || /\.gif$/.test(name)) return 'gif';
            return 'image';
        }

        function getVideoDuration(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const videoEl = document.createElement('video');
                videoEl.preload = 'metadata';
                videoEl.onloadedmetadata = () => {
                    URL.revokeObjectURL(url);
                    resolve(videoEl.duration);
                };
                videoEl.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Could not read video metadata'));
                };
                videoEl.src = url;
            });
        }

        async function validateFile(file) {
            const kind = getFileKind(file);
            if (kind === 'video') {
                if (file.size > MAX_VIDEO_BYTES) {
                    showToast(`"${file.name}" is too large — videos must be under 15MB.`, 'error');
                    return null;
                }
                try {
                    const duration = await getVideoDuration(file);
                    if (duration > MAX_VIDEO_SECONDS + 0.5) {
                        showToast(`"${file.name}" is too long — videos must be 15s or shorter.`, 'error');
                        return null;
                    }
                } catch (e) {
                    showToast(`Couldn't read "${file.name}" — skipped.`, 'error');
                    return null;
                }
            }
            return kind;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const statusMsg = document.getElementById('statusMsg');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');

            if (!isDemo) {
                try {
                    const res = await databases.listDocuments(cfg.DATABASE_ID, cfg.COLLECTION_ID, [ Appwrite.Query.equal('eventId', eventId) ]);
                    if (res.documents.length === 0 || res.documents[0].status === 'ended') {
                        statusMsg.innerText = 'Event has ended or not found.'; uploadBtn.disabled = true; throw new Error("Halt");
                    }
                    applyTheme(res.documents[0].theme);
                } catch (err) { statusMsg.innerText = 'Connection error.'; }
            } else { statusMsg.innerText = "Sandbox Mode Active"; }

            uploadBtn.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', async (e) => {
                let files = Array.from(e.target.files);
                if (files.length === 0) return;

                if (files.length > MAX_FILES) {
                    showToast(`You can upload up to ${MAX_FILES} files at once — sending the first ${MAX_FILES}.`, 'error');
                    files = files.slice(0, MAX_FILES);
                }

                uploadBtn.disabled = true;
                let sent = 0;

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    statusMsg.innerText = `Checking ${i + 1}/${files.length}...`;
                    const kind = await validateFile(file);
                    if (!kind) continue;

                    try {
                        statusMsg.innerText = `Uploading ${i + 1}/${files.length}...`;
                        let uploadBlob = file;
                        let mimeType = file.type;

                        if (kind === 'image') {
                            uploadBlob = await compressImage(file, 1920); // max 1080p
                            mimeType = 'image/jpeg';
                        } else if (!mimeType) {
                            if (/\.mp4$/i.test(file.name)) mimeType = 'video/mp4';
                            else if (/\.mov$/i.test(file.name)) mimeType = 'video/quicktime';
                            else if (/\.gif$/i.test(file.name)) mimeType = 'image/gif';
                        }

                        // Secure Appwrite v14 filename isolation
                        const safeName = `${eventId}_${Date.now()}_${i}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
                        const safeFile = new File([uploadBlob], safeName, { type: mimeType });

                        await storage.createFile(cfg.BUCKET_ID, Appwrite.ID.unique(), safeFile);
                        sent++;
                    } catch (err) {
                        console.error("Compression/Upload Error:", err);
                        showToast(`Failed to upload "${file.name}".`, 'error');
                    }
                }

                if (sent > 0) {
                    statusMsg.innerText = `Sent ${sent} file${sent > 1 ? 's' : ''} to TV! 🚀`;
                    showToast(`${sent} file${sent > 1 ? 's' : ''} sent successfully!`, 'success');
                } else {
                    statusMsg.innerText = 'Nothing was uploaded.';
                }

                setTimeout(() => { statusMsg.innerText = 'Tap to send a photo or video'; uploadBtn.disabled = false; }, 2200);
                fileInput.value = '';
            });

            // Image Compression Helper
            function compressImage(file, maxWidth) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = event => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;

                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            canvas.toBlob(blob => { resolve(blob); }, 'image/jpeg', 0.8);
                        };
                        img.onerror = e => reject(e);
                    };
                    reader.onerror = e => reject(e);
                });
            }

            async function checkEventStatus() {
                if (isDemo) return;
                try {
                    const res = await databases.listDocuments(cfg.DATABASE_ID, cfg.COLLECTION_ID, [ Appwrite.Query.equal('eventId', eventId) ]);
                    if (res.documents.length === 0 || res.documents[0].status === 'ended') {
                        document.body.innerHTML = '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100%; background:#020617; z-index:9999; position:absolute; top:0; left:0; text-align:center;"><h1 style="font-size: 3rem; color: #ef4444; font-family:\'Syne\'; margin-bottom:10px;">Event Ended</h1><p style="color: #94a3b8; font-size: 1.2rem; padding: 0 20px;">Thanks for taking part! You can safely close this page.</p></div>';
                    } else {
                        applyTheme(res.documents[0].theme);
                    }
                } catch(e) {}
            }
            setInterval(checkEventStatus, 5000);
        });
    </script>
</body>
</html>
